<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AIVA Beauty – Login</title>
<link rel="stylesheet" href="/static/style.css" onerror="this.onerror=null;this.href='style.css';">
</head>

<body>

<div class="login-container">
  <div class="login-left">
    <img src="/static/images/WhatsApp%20Image%202026-02-14%20at%208.22.13%20PM%20(1).jpeg" onerror="this.onerror=null;this.src='images/WhatsApp%20Image%202026-02-14%20at%208.22.13%20PM%20(1).jpeg';" class="app-logo" alt="AIVA Logo">
    <p>Welcome back! Sign in to manage your bookings, clients, and AI-powered beauty workflows.</p>
  </div>

  <div class="login-right">
    <h2>Login</h2>
    <p class="login-subtext">Access your beauty business dashboard</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="signup-link">
      Don’t have an account?
      <a href="/signup">Create Account</a>
    </p>
  </div>
</div>

<script>
const API_URL = (localStorage.getItem("API_URL") || window.location.origin).replace(/\/+$/, "");

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Please fill all fields");
    return;
  }

  const res = await fetch(`${API_URL}/login`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email,
      password: password
    })
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.detail || "Login failed");
    return;
  }

  // Support both current backend schema and legacy keys.
  const token = data.access_token || data.token;
  const technicianId = data.technician?.id || data.technician_id;
  const businessName = data.technician?.business_name || data.business_name || "";

  if (!token) {
    alert("Login succeeded but no token was returned by the server.");
    return;
  }

  localStorage.setItem("token", token);
  if (technicianId !== undefined && technicianId !== null) {
    localStorage.setItem("technician_id", String(technicianId));
  }
  localStorage.setItem("business_name", businessName);

window.location.href = "/dashboard";
}
</script>

</body>
</html>
